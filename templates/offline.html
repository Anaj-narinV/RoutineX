<head>

  <title>RoutineX - Offline</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="dashboard">
    <div class="card glass-card" style="text-align:center; padding:60px;">
